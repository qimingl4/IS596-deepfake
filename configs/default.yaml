# Deep-Guard Agent Configuration

detection:
  visual:
    backend: "mediapipe"
    face_mesh_confidence: 0.5
    temporal_smoothing: 0.0

  audio:
    model_name: "facebook/wav2vec2-base-960h"
    sample_rate: 16000
    use_mfa: false

  fusion:
    checkpoint_path: null
    discrepancy_threshold: 0.65

reasoning:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  base_url: "https://api.groq.com/openai/v1"
  temperature: 0.3
  max_tokens: 2048

interface:
  overlay:
    heatmap_opacity: 0.4

app:
  host: "0.0.0.0"
  port: 7860
  max_video_duration_sec: 300
  temp_dir: "/tmp/deepguard"
